name: testapp

services:
  web:
    env_var: PORT
    hostname: testapp.test
    aliases:
      app: app.testapp.test
      admin: admin.testapp.test
  postgres:
    env_var: DB_PORT
    preferred_port: 5432

computed:
  CORS_ORIGINS:
    value: "${web.url}"
    env_file: .env
  PC_SOCKET_PATH:
    value: "/tmp/process-compose-${project_name}${instance:+-${instance}}.sock"
    env_file: .pc_env
